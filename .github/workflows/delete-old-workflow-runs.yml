name: Delete Old Workflow Runs

on:
  schedule:
    - cron: '0 0 1 * *' # Run monthly, at 00:00 on the 1st day of month.
  workflow_dispatch:

jobs:
  del_runs:
    runs-on: ubuntu-latest
    steps:
      - name: 删除 workflow runs
        uses: your-username/delete-old-workflow-runs@main   # your-username为你的github用户名
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 10
